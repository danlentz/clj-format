name: Clojure CI

on:
  push:
    branches:
      - "*"
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Prepare java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Prepare Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install clojure tools
      uses: DeLaGuardo/setup-clojure@13.4
      with:
        # Install just one or all simultaneously
        # The value must indicate a particular version of the tool, or use 'latest'
        # to always provision the latest version
        #        cli: 1.10.1.693              # Clojure CLI based on tools.deps
        lein: 2.11.2                  # Leiningen
        bb: latest                    # Babashka

    - name: Run JVM tests
      shell: bash
      run: |
        set -o pipefail
        lein test 2>&1 | tee /tmp/jvm-out.log
        grep -qE 'Ran [0-9]+ tests' /tmp/jvm-out.log || {
          echo "::error::JVM suite produced no 'Ran N tests' summary — tests did not execute."
          exit 1
        }

    - name: Run CLJS tests
      shell: bash
      run: |
        set -o pipefail
        ./bin/test-cljs 2>&1 | tee /tmp/cljs-out.log
        # Guard against silent-green: require that some tests actually ran.
        grep -qE 'Ran [0-9]+ tests' /tmp/cljs-out.log || {
          echo "::error::CLJS suite produced no 'Ran N tests' summary — tests did not execute."
          exit 1
        }

    - name: Run Babashka smoke tests
      shell: bash
      run: |
        set -o pipefail
        bb test/clj_format/bb_runner.clj 2>&1 | tee /tmp/bb-out.log
        grep -qE 'Ran [0-9]+ tests' /tmp/bb-out.log || {
          echo "::error::Babashka suite produced no 'Ran N tests' summary — tests did not execute."
          exit 1
        }
